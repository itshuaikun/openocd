transport select jtag

gdb port disabled
telnet port disabled
tcl port disabled

set _CHIPNAME riscv_xuantie_cpu
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x10000b6f -ignore-version
set _TARGETNAME_0 $_CHIPNAME.cpu0
target create $_TARGETNAME_0 riscv -chain-position $_CHIPNAME.cpu -coreid 0

adapter srst pulse_width 10
reset_config trst_and_srst
